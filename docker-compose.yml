version: '3.8'

services:
  # --- Infrastructure ---

  postgres-product:
    image: postgres:15-alpine
    container_name: ms-product-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_db
    ports:
      - "5433:5432"
    volumes:
      - product-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:15-alpine
    container_name: ms-order-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    volumes:
      - order-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ms-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Services ---

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: ms-product-service
    ports:
      - "8081:8081"
    environment:
      - APP_PORT=8081
      - DB_URL=postgresql://postgres-product:5432/product_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_DRIVER=org.postgresql.Driver
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres-product:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: ms-order-service
    ports:
      - "8082:8082"
    environment:
      - APP_PORT=8082
      - DB_URL=postgresql://postgres-order:5432/order_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_DRIVER=org.postgresql.Driver
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PRODUCT_SERVICE_URL=http://product-service:8081
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ms-api-gateway
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - JWT_SECRET=super_secret_microservices_key
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
      - REDIS_HOST=redis
    depends_on:
      - product-service
      - order-service
      - redis

volumes:
  product-pgdata:
  order-pgdata:
